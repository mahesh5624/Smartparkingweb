<!DOCTYPE html>
<html>
<head>
<title>Smart Parking Dashboard</title>
<style>
body { font-family: Arial; background: #0f172a; color: white; text-align: center; }

.grid {
  display: grid;
  grid-template-columns: repeat(3, 150px);
  gap: 20px;
  justify-content: center;
  margin-top: 20px;
}

.slot {
  padding: 30px;
  border-radius: 10px;
}

.free { background: green; }
.occupied { background: red; }

button { margin: 10px; padding: 10px; }
</style>
</head>

<body>

<h1>🚗 Smart Parking Dashboard</h1>

<button onclick="loadSlots()">Refresh Slots</button>

<div class="grid" id="grid"></div>

<h2 id="count"></h2>

<hr>

<h2>💾 Store Dummy Entry</h2>
<button onclick="storeData()">Add Entry</button>

<h2>📋 Logs</h2>
<button onclick="loadLogs()">Load Logs</button>

<div id="logs"></div>

<script>
function loadSlots() {
  fetch("/api/slots")
    .then(res => res.json())
    .then(data => {
      let grid = document.getElementById("grid");
      grid.innerHTML = "";

      data.slots.forEach((s, i) => {
        let div = document.createElement("div");
        div.className = "slot " + (s ? "occupied" : "free");
        div.innerHTML = `Slot ${i+1}<br>${s ? "Occupied" : "Free"}`;
        grid.appendChild(div);
      });

      document.getElementById("count").innerText =
        `Occupied: ${data.occupied} / ${data.total}`;
    });
}

function storeData() {
  fetch("/api/store", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      plate: "AP01AB1234",
      slot: 1,
      status: "occupied"
    })
  }).then(() => alert("Stored in DB"));
}

function loadLogs() {
  fetch("/api/logs")
    .then(res => res.json())
    .then(data => {
      let html = "";
      data.forEach(l => {
        html += `<p>${l.plate} | Slot ${l.slot} | ${l.status} | ${l.time}</p>`;
      });
      document.getElementById("logs").innerHTML = html;
    });
}

loadSlots();
</script>

</body>
</html>
