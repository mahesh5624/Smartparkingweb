<!DOCTYPE html>
<html>
<head>
<title>Smart Parking Dashboard</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  text-align: center;
}

h1 {
  color: #22c55e;
}

.grid {
  display: grid;
  grid-template-columns: repeat(3, 150px);
  gap: 20px;
  justify-content: center;
  margin-top: 20px;
}

.slot {
  padding: 30px;
  border-radius: 10px;
  font-size: 18px;
}

.free {
  background: green;
}

.occupied {
  background: red;
}

button {
  margin: 10px;
  padding: 10px;
}

table {
  margin: auto;
  margin-top: 20px;
  border-collapse: collapse;
}

td, th {
  padding: 10px;
  border: 1px solid white;
}
</style>

</head>

<body>

<h1>🚗 Smart Parking Dashboard</h1>

<button onclick="loadSlots()">🔄 Refresh Slots</button>
<button onclick="loadLogs()">📋 Load Logs</button>

<div class="grid" id="grid"></div>

<h2 id="count"></h2>

<h2>📊 Parking Logs</h2>
<div id="logs"></div>

<script>

function loadSlots() {
  fetch("/api/slots")
    .then(res => res.json())
    .then(data => {
      let grid = document.getElementById("grid");
      grid.innerHTML = "";

      data.slots.forEach((s, i) => {
        let div = document.createElement("div");
        div.className = "slot " + (s ? "occupied" : "free");
        div.innerHTML = `Slot ${i+1}<br>${s ? "Occupied" : "Free"}`;
        grid.appendChild(div);
      });

      document.getElementById("count").innerText =
        `Occupied: ${data.occupied} / ${data.total}`;
    });
}


function loadLogs() {
  fetch("/api/logs")
    .then(res => res.json())
    .then(data => {
      let html = "<table>";
      html += "<tr><th>Plate</th><th>Slot</th><th>Status</th><th>Time</th></tr>";

      data.forEach(l => {
        html += `<tr>
          <td>${l.plate}</td>
          <td>${l.slot}</td>
          <td>${l.status}</td>
          <td>${l.time}</td>
        </tr>`;
      });

      html += "</table>";

      document.getElementById("logs").innerHTML = html;
    });
}

loadSlots();
setInterval(loadSlots, 3000);

</script>

</body>
</html>
